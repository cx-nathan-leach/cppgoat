<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        form {
            max-width: 320px;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        /* hyperlink-style submit button */
        .submit-link {
            display: inline-block;
            margin-top: 20px;
            background: none;
            border: none;
            color: #0a58ca;
            padding: 0;
            font-size: 1em;
            cursor: pointer;
            text-decoration: underline;
        }

        .create {
            display: block;
            margin-top: 10px;
        }

        /* bold red message box */
        .msg {
            margin-bottom: 16px;
            padding: 10px 12px;
            border: 1px solid #ffcccc;
            background: #ffe6e6;
            color: #cc0000;
            font-weight: bold;
            border-radius: 6px;
            display: none;
            max-width: 320px;
        }
    </style>
</head>

<body>
    <h2>Login</h2>

    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <form action="/login" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>

        <button type="submit" class="submit-link">Login</button>

        <a href="/create" class="create">Create user</a>
    </form>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const msg = params.get("msg");
            if (msg) {
                const box = document.getElementById("msg");
                box.textContent = msg; // safe
                box.style.display = "block";
            }
        })();
    </script>
</body>
</html>
