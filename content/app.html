<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encode Payload</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      margin: 0;
      background: Canvas;
      color: CanvasText;
      line-height: 1.5;
    }

    /* Header */
    header {
      padding: 1rem 1.25rem;
      background: color-mix(in srgb, CanvasText 8%, Canvas);
      border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header .info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    header .username-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    header a.logout {
      font-weight: 600;
      text-decoration: none;
      color: inherit;
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, CanvasText 25%, Canvas);
      background: color-mix(in srgb, CanvasText 6%, Canvas);
    }

    /* Main */
    main {
      padding: 1.25rem;
      max-width: 900px;
      margin: 0 auto;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label { font-weight: 600; }

    textarea {
      width: 100%;
      min-height: 280px;
      padding: 0.75rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, Canvas);
      border-radius: 8px;
      resize: vertical;
      background: inherit;
      color: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.95rem;
    }

    button[type="submit"] {
      justify-self: start;
      padding: 0.6rem 1rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, Canvas);
      background: color-mix(in srgb, CanvasText 6%, Canvas);
      color: inherit;
      border-radius: 8px;
      cursor: pointer;
    }

    .hint {
      font-size: 0.9rem;
      color: color-mix(in srgb, CanvasText 60%, Canvas);
    }

    .error {
      color: #b00020;
      font-size: 0.95rem;
      margin-top: 0.25rem;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="info">
      <div class="username-line">
        Signed in as: <span id="username">loading…</span>
      </div>
      <div class="hint">Username pulled from the <code>auth_token</code> JWT (claim <code>username</code>).</div>
    </div>

    <!-- ✅ Proper logout hyperlink -->
    <nav>
      <a class="logout" href="/logout">Logout</a>
    </nav>
  </header>

  <main>
    <h1>Encode Payload</h1>
    <p class="hint">
      Submit your text payload to be encoded by the server. This form sends a <code>POST</code> to <code>/encode</code>.
    </p>

    <!-- ✅ Proper opening form tag -->
    <form action="/encode" method="post">
      <label for="payload">Text payload</label>
      <textarea id="payload" name="payload" placeholder="Enter the text to encode…" required></textarea>
      <button type="submit">Encode</button>
    </form>

    <div id="jwtError" class="error" role="alert"></div>
  </main>

  <script>
    // --- Cookie helper ---
    function getCookie(name) {
      const all = document.cookie ? document.cookie.split('; ') : [];
      for (const c of all) {
        const [k, ...v] = c.split('=');
        if (decodeURIComponent(k) === name) return v.join('=');
      }
      return null;
    }

    // --- Base64URL decode to UTF-8 string ---
    function base64UrlDecodeToString(b64url) {
      let b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64.length % 4;
      if (pad === 2) b64 += '==';
      else if (pad === 3) b64 += '=';
      else if (pad !== 0) throw new Error('Invalid base64url string length');

      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
    }

    // --- Parse JWT payload (no signature verification) ---
    function parseJwtPayload(token) {
      const parts = token.split('.');
      if (parts.length < 2) throw new Error('Invalid JWT format');
      return JSON.parse(base64UrlDecodeToString(parts[1]));
    }

    // --- Insert username using innerHTML as requested ---
    function setUsernameInnerHtml(value) {
      const el = document.getElementById('username');
      if (el) el.innerHTML = value || '';
    }

    function showError(message) {
      const el = document.getElementById('jwtError');
      if (!el) return;
      el.textContent = message;
      el.style.display = 'block';
    }

    (function initUsernameFromJwt() {
      try {
        const token = getCookie('auth_token');
        if (!token) {
          setUsernameInnerHtml('anonymous');
          showError('No auth_token cookie found.');
          return;
        }
        const payload = parseJwtPayload(token);
        const username =
          payload.username ??
          payload.preferred_username ??
          payload.upn ??
          payload.email ??
          payload.sub ??
          'unknown';

        setUsernameInnerHtml(username);
      } catch (err) {
        setUsernameInnerHtml('unknown');
        showError('Failed to read username from JWT: ' + (err?.message || String(err)));
      }
    })();
  </script>
</body>
</html>
